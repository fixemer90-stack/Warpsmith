{% extends "base.html" %}
{% block content %}
<div x-data="teamBuilder()" class="max-w-6xl mx-auto py-8 px-4">
    <script src="/static/team_builder.js"></script>
    <script>
        window._iconSvgMap = {{ _icon_svg_map_json | safe }};
    </script>
    <link rel="stylesheet" href="/static/unit_card.css">
    <h1 class="text-2xl font-bold text-white mb-6">🛠 Team Builder</h1>
    <script src="/static/synergy_hints.js"></script>
    <script src="/static/detachment_picker.js"></script>
    <script src="/static/unit_modal.js"></script>

    <!-- Step 1: Faction + Game Size + Roster Name -->
    <div class="bg-gray-800 rounded-lg p-4 mb-4">
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Faction</label>
                <select x-model="faction" @change="onFactionChange()"
                        class="w-full bg-gray-700 text-white rounded px-3 py-2">
                    <option value="">-- Select Faction --</option>
                    {% for faction in factions %}
                    <option value="{{ faction.id }}">{{ faction.label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-2">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Game Size</label>
                <select x-model="gameSize" @change="updatePtsLimit()"
                        class="w-full bg-gray-700 text-white rounded px-3 py-2">
                    <option value="500">Combat Patrol (500 pts)</option>
                    <option value="1000">Incursion (1000 pts)</option>
                    <option value="2000" selected>Strike Force (2000 pts)</option>
                    <option value="3000">Onslaught (3000 pts)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Roster Name</label>
                <input x-model="name" type="text" placeholder="My Army"
                       class="w-full bg-gray-700 text-white rounded px-3 py-2">
            </div>
        </div>
    </div>

    <!-- Step 1.5: Detachment Picker -->
    {% include "partials/detachment_picker.html" %}

    <!-- Step 2: Unit Browser -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Categories -->
        <div class="bg-gray-800 rounded-lg p-4">
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Categories</h3>
            <div class="space-y-1">
                <template x-for="cat in Object.keys(unitsByCategory)" :key="cat">
                    <button @click="selectedCategory = cat"
                            class="w-full text-left px-3 py-2 rounded text-sm"
                            :class="selectedCategory == cat
                                ? 'bg-blue-600 text-white'
                                : 'bg-gray-700 text-gray-300 hover:bg-gray-600'">
                        <span x-text="cat"></span>
                        <span class="text-gray-500 text-xs ml-1"
                              x-text="`(${unitsByCategory[cat]?.length || 0})`"></span>
                    </button>
                </template>
            </div>
        </div>

        <!-- Units List -->
        <div class="bg-gray-800 rounded-lg p-4 lg:col-span-1">
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Units</h3>
            <div class="space-y-2 max-h-96 overflow-y-auto">
                <template x-if="filteredUnits.length === 0">
                    <p class="text-gray-500 text-sm text-center py-8">Select a faction to see units.</p>
                </template>
                <template x-for="unit in filteredUnits" :key="unit.name">
                    <div @click="openUnitModal(unit.name)"
                         class="bg-gray-700 rounded p-2 cursor-pointer hover:bg-gray-600 transition">
                        <div class="flex justify-between items-center">
                            <span class="flex items-center gap-1.5 text-white text-xs font-medium truncate">
                                <span x-text="unit.name"></span>
                                <template x-for="ic in unit.icon" :key="ic">
                                    <span class="w-3.5 h-3.5 shrink-0 opacity-60 icon-category"
                                          x-html="getIconHtml(ic, 14)"></span>
                                </template>
                            </span>
                            <span class="text-yellow-400 text-xs shrink-0 ml-2" x-text="unit.points + 'pts'"></span>
                        </div>
                        <!-- Beginner-friendly: all stats with full names -->
                        <div class="beginner-stats hidden text-xs text-gray-400 gap-2 flex-wrap mt-1">
                            {% raw %}
                            <span data-stat="M" x-text="'Movement ' + unit.movement + '&quot;'"></span>
                            <span class="text-gray-600">·</span>
                            <span data-stat="T" x-text="'Toughness ' + unit.toughness"></span>
                            <span class="text-gray-600">·</span>
                            <span data-stat="SV" x-text="'Save ' + unit.save + '+'"></span>
                            <span class="text-gray-600">·</span>
                            <span data-stat="W" x-text="'Wounds ' + unit.wounds"></span>
                            <template x-if="unit.leadership">
                                <span class="text-gray-600">·</span>
                            </template>
                            <template x-if="unit.leadership">
                                <span data-stat="LD" x-text="'Leadership ' + unit.leadership + '+'"></span>
                            </template>
                            <template x-if="unit.oc">
                                <span class="text-gray-600">·</span>
                            </template>
                            <template x-if="unit.oc">
                                <span data-stat="OC" x-text="'Objective Control ' + unit.oc"></span>
                            </template>
                            {% endraw %}
                        </div>
                        <!-- Expert: compact stat line with all 6 stats -->
                        <div class="stat-value text-gray-400 text-xs mt-1 flex gap-2 flex-wrap">
                            {% raw %}
                            <span data-stat="M" x-text="'M' + unit.movement + '&quot;'"></span>
                            <span data-stat="T" x-text="'T' + unit.toughness"></span>
                            <span data-stat="SV" x-text="'SV' + unit.save + '+'"></span>
                            <span data-stat="W" x-text="'W' + unit.wounds"></span>
                            <span data-stat="LD" x-show="unit.leadership" x-text="'LD' + unit.leadership + '+'"></span>
                            <span data-stat="OC" x-show="unit.oc" x-text="'OC' + unit.oc"></span>
                            {% endraw %}
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Current Roster -->
        <div class="bg-gray-800 rounded-lg p-4">
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Roster</h3>

            <!-- PTS Bar -->
            <div class="mb-4">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span x-text="`${totalPts} / ${ptsLimit} pts`"></span>
                    <span x-text="`${unitCount} units`"></span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-3">
                    <div class="h-3 rounded-full transition-all duration-300"
                         :style="`width: ${Math.min(100, (totalPts / ptsLimit * 100))}%`"
                         :class="totalPts > ptsLimit ? 'bg-red-500' : 'bg-green-500'">
                    </div>
                </div>
            </div>

            <!-- Unit List -->
            <template x-if="warlordRequired && !hasValidWarlordSelection">
                <div class="mb-3 bg-amber-900/30 border border-amber-700 rounded p-2 text-amber-200 text-xs">
                    <span x-text="warlordWarningMessage"></span>
                </div>
            </template>
            <div class="space-y-2 max-h-80 overflow-y-auto">
                <template x-for="(entry, idx) in roster" :key="idx">
                    <div class="rounded p-2 flex justify-between items-center"
                         :class="getSynergyClass(entry.name)">
                        <span class="w-2 h-2 rounded-full flex-shrink-0 mr-2"
                              :class="getSynergyDot(entry.name)"></span>
                        <div class="flex-1">
                            <span class="text-white text-sm" x-text="entry.name"></span>
                            <span class="text-gray-400 text-xs ml-1"
                                  x-text="`x${entry.squad_size}`"></span>
                            <template x-if="entry.is_warlord">
                                <span class="ml-1 text-[10px] px-1.5 py-0.5 rounded bg-yellow-500/20 text-yellow-300 border border-yellow-600/60">
                                    Warlord
                                </span>
                            </template>
                        </div>
                        <div class="flex items-center gap-2">
                            <template x-if="entry.can_be_warlord">
                                <button type="button"
                                        @click.stop="setWarlord(idx)"
                                        class="text-xs rounded px-1.5 py-0.5 border transition"
                                        :title="entry.is_warlord ? 'Selected Warlord' : 'Set as Warlord'"
                                        :aria-label="entry.is_warlord ? 'Selected Warlord' : 'Set as Warlord'"
                                        :class="entry.is_warlord
                                            ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300'
                                            : 'border-gray-600 text-gray-500 hover:text-yellow-300 hover:border-yellow-500'">
                                    👑
                                </button>
                            </template>
                            <span class="text-yellow-400 text-xs" x-text="entry.pts + 'pts'"></span>
                            <button @click="removeUnit(idx)" class="text-red-400 text-xs hover:text-red-300">✕</button>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Actions -->
            <div class="mt-4 space-y-2">
                <button @click="saveRoster()"
                        :disabled="!isValid"
                        class="w-full bg-blue-600 text-white rounded py-2 font-medium
                                disabled:opacity-50 disabled:cursor-not-allowed">
                    💾 Save Roster
                </button>
                <template x-if="validationErrors.length > 0">
                    <div class="bg-red-900/30 border border-red-700 rounded p-2 text-red-400 text-xs">
                        <template x-for="err in validationErrors" :key="err.code">
                            <div x-text="err.message"></div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Step 2.5: Synergy Panel -->
    {% include "partials/synergy_panel.html" %}

    <!-- Tooltip system -->
    {% include "partials/tooltip_definitions.html" %}

    <!-- Unit Modal (F4.2 — Full Datasheet) -->
    <div x-show="showUnitModal" x-cloak
         class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
         @click.away="showUnitModal = false"
         @keydown.escape.window="showUnitModal = false">

        <div class="bg-gray-800 rounded-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <!-- Loading State -->
            <template x-if="unitLoading">
                <div class="p-8 text-center text-gray-400">
                    <div class="animate-spin h-8 w-8 border-2 border-blue-500
                                border-t-transparent rounded-full mx-auto mb-4"></div>
                    Loading unit data...
                </div>
            </template>

            <!-- Unit Detail -->
            <template x-if="!unitLoading && unitDetail">
                <div>
                    <!-- Header -->
                    <div class="sticky top-0 bg-gray-800 p-4 border-b border-gray-700
                                flex items-center gap-3">
                        <div class="flex-1">
                            <h2 class="text-lg font-bold text-white" x-text="unitDetail.name"></h2>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <template x-for="tag in (unitDetail.icon_tags || [])" :key="tag">
                                    <span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-700 text-gray-300 capitalize"
                                          x-text="tag.replace('-', ' ')"></span>
                                </template>
                            </div>
                        </div>
                        <span class="text-yellow-400 font-bold text-lg"
                              x-text="unitDetail.points + 'pts'"></span>
                    </div>

                    <div class="p-4 space-y-4">
                        <!-- Stats Strip (M/T/SV/W/LD/OC) -->
                        <div class="grid grid-cols-6 gap-2 text-center text-xs">
                            <div data-stat="M" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Movement — how many inches this model moves per phase">
                                <div class="text-gray-400">M</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.movement + '&#34;'"></div>
                            </div>
                            <div data-stat="T" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Toughness — compared to weapon Strength for wound rolls">
                                <div class="text-gray-400">T</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.toughness"></div>
                            </div>
                            <div data-stat="SV" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Save — armour saving throw target">
                                <div class="text-gray-400">SV</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.save + '+'"></div>
                            </div>
                            <div data-stat="W" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Wounds — how much damage this model can take">
                                <div class="text-gray-400">W</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.wounds"></div>
                            </div>
                            <div data-stat="LD" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Leadership — morale/bravery stat">
                                <div class="text-gray-400">LD</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.leadership + '+'"></div>
                            </div>
                            <div data-stat="OC" class="bg-gray-700 rounded p-2 cursor-help"
                                 title="Objective Control — controlling objectives">
                                <div class="text-gray-400">OC</div>
                                <div class="text-white font-bold text-sm"
                                     x-text="unitDetail.oc"></div>
                            </div>
                        </div>

                        <!-- Squad Size -->
                        <div>
                            <label class="block text-sm text-gray-300 mb-1">
                                Squad Size
                                <span class="text-gray-500 text-xs"
                                      x-text="unitDetail.squad_size
                                        ? `(${unitDetail.squad_size.min}-${unitDetail.squad_size.max})`
                                        : ''"></span>
                            </label>
                            <div class="flex items-center gap-2">
                                <button @click="squadSize = Math.max(unitDetail.squad_size?.min || 1, squadSize - (unitDetail.squad_size?.step || 1))"
                                        class="bg-gray-700 text-white px-3 py-1 rounded hover:bg-gray-600"
                                        :disabled="squadSize <= (unitDetail.squad_size?.min || 1)">
                                    −
                                </button>
                                <input type="number" x-model="squadSize"
                                       :min="unitDetail.squad_size?.min || 1"
                                       :max="unitDetail.squad_size?.max || 20"
                                       class="w-20 bg-gray-700 text-white text-center rounded px-2 py-1">
                                <button @click="squadSize = Math.min(unitDetail.squad_size?.max || 20, squadSize + (unitDetail.squad_size?.step || 1))"
                                        class="bg-gray-700 text-white px-3 py-1 rounded hover:bg-gray-600"
                                        :disabled="squadSize >= (unitDetail.squad_size?.max || 20)">
                                    +
                                </button>
                                <!-- Quick presets -->
                                <template x-for="size in getQuickSizes()" :key="size">
                                    <button @click="squadSize = size"
                                            class="text-xs px-2 py-1 rounded"
                                            :class="squadSize === size
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-700 text-gray-400 hover:bg-gray-600'"
                                            x-text="size">
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Loadout / Wargear Selection -->
                        <div x-show="unitDetail.wargear_options?.length > 0">
                            <label class="block text-sm text-gray-300 mb-2">Loadout</label>
                            <div class="space-y-2">
                                <template x-for="option in unitDetail.wargear_options" :key="option.name">
                                    <label class="flex items-start gap-3 bg-gray-700 rounded p-3
                                                  cursor-pointer hover:bg-gray-600"
                                           :class="selectedLoadout === option.name
                                               ? 'ring-2 ring-blue-500' : ''">
                                        <input type="radio" name="loadout"
                                               :value="option.name"
                                               x-model="selectedLoadout"
                                               class="mt-1">
                                        <div class="flex-1">
                                            <div class="flex justify-between">
                                                <span class="text-white text-sm font-medium"
                                                      x-text="option.name"></span>
                                                <span class="text-yellow-400 text-xs"
                                                      x-text="(option.points > 0 ? '+' : '') + option.points + 'pts'"></span>
                                            </div>
                                            <div class="text-gray-400 text-xs mt-1"
                                                 x-text="option.description || ''"></div>
                                            <template x-if="option.recommended">
                                                <span class="inline-block bg-blue-900 text-blue-300
                                                             text-xs px-2 py-0.5 rounded mt-1">
                                                    ★ Recommended
                                                </span>
                                            </template>
                                        </div>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Nob / Sergeant Options -->
                        <div x-show="unitDetail.nob_options?.length > 0">
                            <label class="block text-sm text-gray-300 mb-2">Nob / Sergeant Upgrade</label>
                            <select x-model="selectedNobOption"
                                    class="w-full bg-gray-700 text-white rounded px-3 py-2">
                                <option value="">None (default loadout)</option>
                                <template x-for="opt in unitDetail.nob_options" :key="opt.name">
                                    <option :value="opt.name"
                                            x-text="opt.name + ' (+' + opt.points + ' pts)'">
                                    </option>
                                </template>
                            </select>
                        </div>

                        <!-- Abilities -->
                        <div x-show="unitDetail.abilities?.length > 0">
                            <label class="block text-sm text-gray-300 mb-2">Abilities</label>
                            <div class="space-y-2">
                                <template x-for="ability in unitDetail.abilities" :key="ability.name || ability">
                                    <div class="bg-gray-700/50 rounded p-2 text-xs">
                                        <span class="text-blue-300 font-medium"
                                              x-text="(ability.name || ability) + ':'"></span>
                                        <span class="text-gray-400"
                                              x-text="ability.description || ''"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Weapons Table -->
                        <div x-show="currentWeapons?.length > 0">
                            <label class="block text-sm text-gray-300 mb-2">Weapons</label>
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead>
                                        <tr class="text-gray-400 border-b border-gray-700">
                                            <th class="text-left py-1 pr-2">Weapon</th>
                                            <th class="py-1 px-2 text-center">RNG</th>
                                            <th class="py-1 px-2 text-center">A</th>
                                            <th class="py-1 px-2 text-center">BS</th>
                                            <th class="py-1 px-2 text-center">S</th>
                                            <th class="py-1 px-2 text-center">AP</th>
                                            <th class="py-1 px-2 text-center">D</th>
                                            <th class="py-1 px-2">Keywords</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="wpn in currentWeapons" :key="wpn.name">
                                            <tr class="border-b border-gray-700/50 text-gray-300">
                                                <td class="py-1 pr-2 font-medium" x-text="wpn.name"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.range || '-'"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.attacks || '-'"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.skill ? wpn.skill + '+' : '-'"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.strength || '-'"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.ap || '-'"></td>
                                                <td class="py-1 px-2 text-center" x-text="wpn.damage || '-'"></td>
                                                <td class="py-1 px-2 text-gray-500"
                                                    x-text="(wpn.abilities || []).join(', ') || (wpn.keywords || []).join(', ') || '-'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Total Cost Bar -->
                        <div class="bg-gray-900 rounded p-3 flex justify-between items-center">
                            <span class="text-sm text-gray-300">
                                Total for <span x-text="squadSize"></span> models
                                <template x-if="selectedNobOption !== ''">
                                    <span class="text-gray-500"> + Nob upgrade</span>
                                </template>
                            </span>
                            <span class="text-yellow-400 font-bold text-lg"
                                  x-text="totalCost + ' pts'"></span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="sticky bottom-0 bg-gray-800 p-4 border-t border-gray-700
                                flex justify-end gap-3">
                        <button @click="showUnitModal = false"
                                class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600">
                            Cancel
                        </button>
                        <button @click="addUnitToRoster()"
                                class="px-6 py-2 bg-blue-600 text-white rounded font-medium
                                       hover:bg-blue-500">
                            Add to Roster
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}
