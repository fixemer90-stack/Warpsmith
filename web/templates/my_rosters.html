{% extends "base.html" %}
{% block content %}
<div x-data="myRosters()" class="max-w-4xl mx-auto py-8 px-4">
    <script src="/static/my_rosters.js"></script>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">📋 My Rosters</h1>
        <a href="/team-builder" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm">
            + New Roster
        </a>
    </div>

    <!-- Tier limit banner (Free users) -->
    <template x-if="tier === 'free'">
        <div class="bg-yellow-900/30 border border-yellow-700 rounded p-3 mb-4 text-yellow-300 text-sm">
            ⚠ Free tier: <span x-text="rosters.length"></span>/3 rosters.
            <a href="/pricing" class="underline">Upgrade to Premium</a> for unlimited rosters.
        </div>
    </template>

    <!-- Rosters table -->
    <template x-if="rosters.length === 0">
        <div class="text-center py-12 text-gray-500">
            <p class="text-lg mb-2">No rosters yet</p>
            <a href="/team-builder" class="text-blue-400 hover:underline">Create your first roster</a>
        </div>
    </template>

    <template x-if="rosters.length > 0">
        <div class="space-y-3">
            <template x-for="roster in rosters" :key="roster.id">
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700
                            hover:border-gray-600 transition">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="text-white font-semibold" x-text="roster.name"></h3>
                                <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-300"
                                    x-text="roster.faction"></span>
                            </div>
                            <div class="text-sm text-gray-400">
                                <span x-text="roster.pts_limit + ' pts'"></span>
                                <template x-if="roster.detachment">
                                    <span> · <span x-text="roster.detachment"></span></span>
                                </template>
                                <span> · <span x-text="(roster.units || []).length + ' units'"></span></span>
                            </div>
                            <!-- Unit list preview (collapsed by default) -->
                            <div x-show="expanded === roster.id" class="mt-2 text-xs text-gray-500 space-y-1">
                                <template x-for="u in (roster.units || [])" :key="u.unit_name">
                                    <div class="flex justify-between">
                                        <span x-text="u.unit_name"></span>
                                        <span>x<span x-text="u.squad_size"></span></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center gap-2 ml-4">
                            <button @click="expanded = expanded === roster.id ? null : roster.id"
                                class="text-gray-500 hover:text-gray-300 text-xs px-2 py-1">
                                <span x-text="expanded === roster.id ? '▲' : '▼'"></span>
                            </button>
                            <a :href="'/team-builder?edit=' + roster.id"
                                class="text-blue-400 hover:text-blue-300 text-sm px-2 py-1">✏</a>
                            <button @click="duplicateRoster(roster.id)"
                                class="text-green-400 hover:text-green-300 text-sm px-2 py-1">📋</button>
                            <button @click="confirmDelete(roster)"
                                class="text-red-400 hover:text-red-300 text-sm px-2 py-1">✕</button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- Delete confirmation modal -->
    <div x-show="deleteTarget" x-cloak class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
        @click.away="deleteTarget = null" @keydown.escape.window="deleteTarget = null">
        <div class="bg-gray-800 rounded-lg p-6 max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold text-white mb-2">Delete Roster?</h3>
            <p class="text-gray-400 text-sm mb-4">
                This will permanently delete
                "<span class="text-white" x-text="deleteTarget?.name"></span>".
                This action cannot be undone.
            </p>
            <div class="flex justify-end gap-3">
                <button @click="deleteTarget = null" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600">
                    Cancel
                </button>
                <button @click="deleteRoster()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-500">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
