<!-- Strategic SVG battlefield map — mission objectives + roster units + true table scale -->
<div class="mt-4 bg-gray-900 rounded-lg border border-gray-700 p-4">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-3">
        <div>
            <h2 class="text-lg font-bold text-white">🗺 Battlefield Preview</h2>
            <p class="text-xs text-gray-400 mt-1">
                Scale: 1 grid = 6″. Objectives follow selected mission; units are placed in deployment zones from selected rosters.
            </p>
        </div>
        <div id="battlefield-map-summary" class="text-xs text-gray-400 font-mono">
            44×60″ · Strike Force
        </div>
    </div>

    <div id="battlefield-map"
         class="relative w-full overflow-hidden rounded-lg border border-gray-700 bg-slate-950"
         style="min-height: 320px;">
        <svg id="battlefield-map-svg"
             role="img"
             aria-label="Battlefield map with deployment zones, objectives, roster units, and inch scale"
             class="block w-full h-auto"
             viewBox="0 0 440 600"
             preserveAspectRatio="xMidYMid meet">
            <rect x="0" y="0" width="440" height="600" fill="#0f172a"></rect>
            <text x="220" y="300" text-anchor="middle" fill="#94a3b8" font-size="16">
                Loading battlefield…
            </text>
        </svg>
    </div>

    <div class="flex flex-wrap gap-x-4 gap-y-1 mt-3 text-xs text-gray-400" id="battlefield-map-legend">
        <div class="flex items-center gap-1.5"><span class="w-4 h-3 inline-block rounded-sm flex-shrink-0" style="background:rgba(59,130,246,0.22);border:1px solid rgba(59,130,246,0.7)"></span>Deploy P1</div>
        <div class="flex items-center gap-1.5"><span class="w-4 h-3 inline-block rounded-sm flex-shrink-0" style="background:rgba(239,68,68,0.22);border:1px solid rgba(239,68,68,0.7)"></span>Deploy P2</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-full flex-shrink-0" style="background:#fbbf24;border:1px solid #fde68a"></span>Objective</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-full flex-shrink-0" style="background:#3b82f6"></span>P1 Unit</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-full flex-shrink-0" style="background:#ef4444"></span>P2 Unit</div>
        <div class="flex items-center gap-1.5"><span class="w-8 h-0.5 inline-block flex-shrink-0" style="background:#94a3b8"></span>12″ ruler</div>
    </div>
</div>
