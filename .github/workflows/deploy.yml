name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy-dokku:
    name: Deploy to Dokku
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dokku deploy
        uses: dokku/github-action@v1.4.0
        with:
          git_remote_url: ${{ secrets.DOKKU_REMOTE_URL }}
          ssh_private_key: ${{ secrets.DOKKU_SSH_KEY }}

  # Альтернатива — Railway deploy
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: false  # Заменить на true при использовании Railway
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        run: railway up --service warpsmith
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}