{% extends "base.html" %}
{% block content %}
<div x-data="teamBuilder()" class="max-w-6xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold">🛠 Team Builder</h1>
        <button @click="saveRoster" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded font-semibold">
            Save Roster
        </button>
    </div>

    <div class="grid grid-cols-3 gap-6">
        <!-- Левая панель: фильтры и библиотека -->
        <div class="col-span-1 bg-gray-800 rounded-lg p-6 border border-gray-700">
            <label class="block text-sm text-gray-400 mb-1">Faction</label>
            <select x-model="faction" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 mb-4">
                <option value="">-- Select --</option>
                <option value="orks">Orks</option>
                <option value="tau">T'au Empire</option>
            </select>

            <label class="block text-sm text-gray-400 mb-1">PTS Limit</label>
            <input type="number" x-model="ptsLimit" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 mb-4"
                   value="2000" min="500" max="3000" step="500">

            <label class="block text-sm text-gray-400 mb-1">Detachment</label>
            <select x-model="detachment" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 mb-4">
                <option value="">-- Select --</option>
                <template x-if="faction === 'orks'">
                    <option>War Horde</option>
                    <option>Da Big Hunt</option>
                </template>
                <template x-if="faction === 'tau'">
                    <option>Kauyon</option>
                    <option>Mont'ka</option>
                </template>
            </select>

            <h2 class="text-lg font-bold mb-3 mt-6">Available Units</h2>
            <div class="text-gray-500 text-sm">Loading from wiki...</div>
        </div>

        <!-- Правая панель: ростер и PTS -->
        <div class="col-span-2 bg-gray-800 rounded-lg p-6 border border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Roster</h2>
                <span class="text-sm" :class="ptsUsed > ptsLimit ? 'text-red-500' : 'text-gray-400'">
                    <span x-text="ptsUsed"></span>/<span x-text="ptsLimit"></span> PTS
                </span>
            </div>

            <!-- Прогресс-бар PTS -->
            <div class="w-full bg-gray-700 rounded-full h-3 mb-6">
                <div class="bg-yellow-500 h-3 rounded-full transition-all"
                     :style="'width: ' + Math.min(100, (ptsUsed/ptsLimit)*100) + '%'"
                     :class="ptsUsed > ptsLimit ? 'bg-red-500' : 'bg-yellow-500'">
                </div>
            </div>

            <!-- Список юнитов в ростере -->
            <template x-if="roster.length === 0">
                <p class="text-gray-500 text-center py-8">No units added yet. Select from the library.</p>
            </template>

            <template x-for="(unit, idx) in roster" :key="idx">
                <div class="flex items-center justify-between bg-gray-700 rounded px-4 py-3 mb-2">
                    <div>
                        <span class="font-semibold" x-text="unit.name"></span>
                        <span class="text-gray-400 text-sm"> ×<span x-text="unit.count"></span></span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-yellow-400" x-text="unit.points * unit.count"></span>
                        <button @click="removeUnit(idx)" class="text-red-400 hover:text-red-300">✕</button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script src="/static/team_builder.js"></script>
{% endblock %}
