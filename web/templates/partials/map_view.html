<!-- map_view.html — Leaflet battlefield map (F4.10 v2) — always visible -->
<div class="mt-4">
    <h2 class="text-lg font-bold text-white mb-2">🗺 Battlefield</h2>
    <div id="battlefield-map" style="height: 500px; width: 100%;"
         class="bg-gray-900 rounded border border-gray-700"></div>

    <!-- Terrain Legend -->
    <div class="flex flex-wrap gap-x-4 gap-y-1 mt-3 text-xs text-gray-400" id="terrain-legend">
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:#2d2d44"></span>Open</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:#4a7a3a"></span>Light Cover</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:#2a5a2a"></span>Heavy Cover</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:#1a1a2e"></span>Obstacle</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:#5a4a2a"></span>Difficult</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:rgba(59,130,246,0.35)"></span>Deploy P1</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-sm flex-shrink-0" style="background:rgba(239,68,68,0.35)"></span>Deploy P2</div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 inline-block rounded-full flex-shrink-0" style="background:#fbbf24"></span>Objective</div>
        <div class="flex items-center gap-1.5"><span class="w-2 h-2 inline-block rounded-full flex-shrink-0" style="background:#3b82f6"></span>P1 Unit</div>
        <div class="flex items-center gap-1.5"><span class="w-2 h-2 inline-block rounded-full flex-shrink-0" style="background:#ef4444"></span>P2 Unit</div>
    </div>
</div>

<style>
#battlefield-map { background: #0f172a; }
.leaflet-container { font-family: inherit; }
.leaflet-tooltip {
    background: #1e293b !important;
    border: 1px solid #334155 !important;
    color: #cbd5e1 !important;
    font-size: 11px !important;
    padding: 2px 6px !important;
    border-radius: 4px !important;
    box-shadow: none !important;
}
.leaflet-tooltip::before { display: none !important; }
</style>
